name: Build and Test

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  GO_VERSION: '1.24.6'
  MATTERMOST_BRANCH: release-11.0

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout OIDC module
        uses: actions/checkout@v4

      - name: Checkout Mattermost
        uses: actions/checkout@v4
        with:
          repository: mattermost/mattermost
          path: mattermost
          ref: ${{ env.MATTERMOST_BRANCH }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: |
            go.sum
            mattermost/server/go.sum

      - name: Update Mattermost go.mod
        run: |
          cd mattermost/server
          echo "" >> go.mod
          echo "require github.com/toowoxx/mattermost-oidc v0.0.0" >> go.mod
          echo "replace github.com/toowoxx/mattermost-oidc => ../../" >> go.mod
          go mod tidy

      - name: Run tests
        run: go test -v -race ./...

      - name: Run tests with coverage
        run: go test -coverprofile=coverage.out ./...

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: coverage.out
          fail_ci_if_error: false

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Checkout Mattermost (for dependencies)
        uses: actions/checkout@v4
        with:
          repository: mattermost/mattermost
          path: mattermost
          ref: ${{ env.MATTERMOST_BRANCH }}

      - name: Setup module replacement
        run: |
          cd mattermost/server
          echo "" >> go.mod
          echo "require github.com/toowoxx/mattermost-oidc v0.0.0" >> go.mod
          echo "replace github.com/toowoxx/mattermost-oidc => ../../" >> go.mod
          go mod tidy

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m

  build-binary:
    name: Build Binary
    runs-on: ubuntu-latest
    needs: [test, lint]

    strategy:
      matrix:
        goos: [linux]
        goarch: [amd64, arm64]

    steps:
      - name: Checkout OIDC module
        uses: actions/checkout@v4

      - name: Checkout Mattermost
        uses: actions/checkout@v4
        with:
          repository: toowoxx/mattermost  # Use your fork
          path: mattermost
          ref: ${{ env.MATTERMOST_BRANCH }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: mattermost/server/go.sum

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          cd mattermost/server
          make build

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: mattermost-${{ matrix.goos }}-${{ matrix.goarch }}
          path: mattermost/server/bin/mattermost
          retention-days: 7

  build-docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [test, lint]
    if: github.event_name != 'pull_request'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            MATTERMOST_BRANCH=${{ env.MATTERMOST_BRANCH }}

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-binary, build-docker]
    if: startsWith(github.ref, 'refs/tags/')

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/**/*
